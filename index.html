<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIDS VISION | Ultimate Wisdom</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Space Grotesk', sans-serif; touch-action: none; }
        #capture-area { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; transition: opacity 0.8s; opacity: 0; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px; box-sizing: border-box; }
        #quote-box { max-width: 850px; width: 95%; z-index: 5; }
        #quote-text { font-family: 'Bangers', cursive; font-size: clamp(1.4rem, 5vw, 2.8rem); color: #fff; text-shadow: 0 0 20px #000; margin-bottom: 20px; line-height: 1.2; text-transform: uppercase; }
        #quote-source { font-size: clamp(0.8rem, 3.5vw, 1.2rem); color: #4ade80; text-transform: uppercase; letter-spacing: 4px; opacity: 0.9; }
        .controls { position: fixed; bottom: 30px; display: flex; gap: 15px; z-index: 100; }
        .btn { background: #fff; color: #000; border: none; padding: 15px 30px; font-family: 'Bangers'; font-size: 1.4rem; cursor: pointer; border-radius: 50px; transition: 0.3s; }
        .btn-dl { background: #4ade80; }
        #loader { color: white; font-family: 'Bangers'; font-size: 1.8rem; text-align: center; z-index: 10; display: none; }
        .hint { position: fixed; top: 20px; color: rgba(255,255,255,0.3); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="hint">Use Arrows, Swipe, or Tap Next</div>

    <div id="capture-area">
        <div id="bg-image"></div>
        <div class="overlay">
            <div id="loader">SEARCHING THE ARCHIVES...</div>
            <div id="quote-box">
                <div id="quote-text">GIDS VISION</div>
                <div id="quote-source">WISDOM LOADING...</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="generateVision()">NEXT</button>
        <button class="btn btn-dl" onclick="downloadVision()">SAVE</button>
    </div>

    <script>
        // MASTER POOL: Ancient + Chassidic + Modern
        const modernSages = [
            { text: "A people is as great as the ideals it survives for.", ref: "Rabbi Jonathan Sacks" },
            { text: "To be a Jew is to be an agent of hope.", ref: "Rabbi Jonathan Sacks" },
            { text: "The opposite of love is not hate, it’s indifference.", ref: "Elie Wiesel" },
            { text: "A man is what he does, not what he says.", ref: "The Lubavitcher Rebbe" },
            { text: "If you want to change the world, start with yourself.", ref: "The Baal Shem Tov" },
            { text: "It is a great mitzvah to be happy always.", ref: "Rebbe Nachman of Breslov" },
            { text: "The world is a very narrow bridge, the main thing is not to be afraid.", ref: "Rebbe Nachman" },
            { text: "Forgetfulness leads to exile, while remembrance is the secret of redemption.", ref: "Baal Shem Tov" }
        ];

        const books = ['Pirkei_Avot', 'Likutei_Moharan', 'Noam_Elimelech', 'Tanya', 'Psalms', 'Proverbs', 'Ecclesiastes', 'Mesillat_Yesharim'];
        
        // --- DE-DUPLICATION ENGINE ---
        let history = new Set();
        let startX = 0;

        async function fetchQuote() {
            // 20% chance to pick from the curated Modern list
            if (Math.random() < 0.2) {
                return modernSages[Math.floor(Math.random() * modernSages.length)];
            }

            const book = books[Math.floor(Math.random() * books.length)];
            const res = await fetch(`https://www.sefaria.org/api/texts/${book}?random=1`);
            const data = await res.json();
            
            let text = Array.isArray(data.text) ? data.text[0] : data.text;
            if (!text || typeof text !== 'string') return null;

            text = text.replace(/<[^>]*>?/gm, '');

            // --- THE WISDOM FILTER ---
            // 1. Length Check: Trash is usually very short or very long
            if (text.length < 45 || text.length > 280) return null; 
            // 2. Headings Check: No "Chapter", "Mishna", or "Section"
            if (/(Chapter|Mishna|Section|Verse|[0-9])/i.test(text)) return null;
            // 3. Meaning Check: Does it have enough words to be a thought?
            if (text.split(' ').length < 8) return null;

            return { text, ref: data.ref };
        }

        async function generateVision() {
            const bg = document.getElementById('bg-image');
            const box = document.getElementById('quote-box');
            const load = document.getElementById('loader');
            
            bg.style.opacity = 0;
            box.style.display = 'none';
            load.style.display = 'block';

            let validQuote = null;
            let attempts = 0;

            // Loop until we find a unique, high-quality quote
            while (attempts < 20) {
                let candidate = await fetchQuote();
                if (candidate && !history.has(candidate.text)) {
                    validQuote = candidate;
                    history.add(candidate.text);
                    // Keep history to 100 quotes
                    if (history.size > 100) {
                        const firstEntry = history.values().next().value;
                        history.delete(firstEntry);
                    }
                    break;
                }
                attempts++;
            }

            if (!validQuote) validQuote = modernSages[Math.floor(Math.random() * modernSages.length)];

            const seed = Math.floor(Math.random() * 20000);
            const imgUrl = `https://picsum.photos/seed/${seed}/1200/1800`;

            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = imgUrl;
            img.onload = () => {
                bg.style.backgroundImage = `url(${imgUrl})`;
                document.getElementById('quote-text').innerText = `"${validQuote.text.toUpperCase()}"`;
                document.getElementById('quote-source').innerText = `— ${validQuote.ref}`;
                
                load.style.display = 'none';
                box.style.display = 'block';
                bg.style.opacity = 1;
            };
        }

        function downloadVision() {
            const area = document.getElementById('capture-area');
            html2canvas(area, { useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Vision.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // --- FIXED CONTROLS ---
        window.addEventListener('keydown', e => { 
            if (e.key === "ArrowRight" || e.key === "ArrowLeft") generateVision(); 
        });

        window.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
        window.addEventListener('touchend', e => { 
            if (Math.abs(startX - e.changedTouches[0].clientX) > 60) generateVision(); 
        });

        generateVision();
    </script>
</body>
</html>
